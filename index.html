<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Tela de login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <strong>Criar conta</strong>

  <form id="formCadastro">
    
    <label>INSIRA O SEU NOME</label>
    <input type="text" id="nome" placeholder="INSIRA O SEU NOME" required/>
    
    <br>

    <label>INSIRA O SEU EMAIL</label>
    <input type="email" id="email" placeholder="INSIRA O SEU EMAIL" required/>
    
    <br>

    <label>INSIRA A SUA SENHA</label>
    <input type="password" id="password" placeholder="INSIRA A SUA SENHA" required/>

    <br>

    <button class="button" type="submit">ENTRAR</button>

    <br>

    <a href="login.html">Já tem uma conta? <span>Login</span></a>

  </form>

  <script src="main.js"></script>

</body>
</html>
